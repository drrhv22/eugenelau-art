<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Eugene Lau — Oil Paintings, San Francisco</title>

<meta name="robots" content="index, follow" />
<meta property="og:title" content="Eugene Lau — Oil Paintings, San Francisco" />
<meta property="og:description" content="A new gallery of original oil paintings, opening soon." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Hanken+Grotesk:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --umber:#211913; --surface:#2C2118; --parchment:#ECE4D7; --taupe:#B7A793;
    --amber:#D8A441; --amber-soft:#E6BE6A;
    --ff-display:"EB Garamond",Georgia,serif;
    --ff-body:"Hanken Grotesk",system-ui,-apple-system,"Segoe UI",sans-serif;
    --ease:cubic-bezier(0.22,0.61,0.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--ff-body); color:var(--parchment);
    background:var(--umber); min-height:100vh; min-height:100svh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:clamp(2rem,6vw,5rem) clamp(1.25rem,5vw,3rem);
    position:relative; overflow-x:hidden; line-height:1.5;
  }
  /* warm lamplight wash */
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(120% 80% at 50% 30%, rgba(216,164,65,0.10), rgba(216,164,65,0) 55%),
      radial-gradient(100% 70% at 50% 120%, rgba(0,0,0,0.55), rgba(0,0,0,0) 60%);
  }
  .stage{position:relative; z-index:1; width:100%; max-width:980px;
    display:flex; flex-direction:column; align-items:center; gap:clamp(2.2rem,5vw,3.4rem)}

  .mark{display:flex; flex-direction:column; align-items:center; gap:0.7rem}
  .kicker{font-size:0.72rem; letter-spacing:0.32em; text-transform:uppercase; color:var(--taupe)}
  .name{font-family:var(--ff-display); font-weight:500; line-height:0.98;
    font-size:clamp(2.7rem,7vw,4.6rem); letter-spacing:0.005em; text-wrap:balance}

  .works{display:flex; align-items:center; justify-content:center; gap:clamp(1rem,3.5vw,2.4rem); width:100%}
  figure{margin:0; position:relative; flex:0 1 auto}
  .frame{position:relative; overflow:hidden; border-radius:3px; background:#0d0a07; isolation:isolate;
    box-shadow:0 0 0 1px rgba(0,0,0,.6),0 0 0 7px var(--surface),0 0 0 8px rgba(216,164,65,.14),0 30px 64px -26px rgba(0,0,0,.85)}
  .frame::after{content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    box-shadow:inset 0 0 90px rgba(0,0,0,.55);
    background:radial-gradient(80% 60% at 50% 38%, rgba(216,164,65,.22), rgba(216,164,65,0) 62%); opacity:.62}
  .frame img{display:block; width:100%; height:100%; object-fit:cover; transform:scale(1.02)}
  .cat .frame{width:min(46vw,420px); aspect-ratio:5/4}
  .lily .frame{width:min(34vw,310px); aspect-ratio:5/4}
  .lily{margin-top:clamp(2rem,5vw,3.6rem)}
  .cat .frame img{object-position:55% 46%}
  .lily .frame img{object-position:50% 50%}

  .message{display:flex; flex-direction:column; align-items:center; gap:0.9rem; max-width:42ch}
  .soon{font-family:var(--ff-display); font-style:italic; font-weight:400; color:var(--amber-soft);
    font-size:clamp(1.45rem,3.4vw,2.1rem); line-height:1.2}
  .note{color:var(--taupe); font-size:clamp(0.95rem,1.6vw,1.05rem)}
  .note a{color:var(--parchment); text-decoration:none; border-bottom:1px solid rgba(216,164,65,.55);
    padding-bottom:1px; transition:color .3s var(--ease),border-color .3s var(--ease)}
  .note a:hover,.note a:focus-visible{color:var(--amber-soft); border-color:var(--amber-soft)}
  .note a:focus-visible{outline:2px solid var(--amber); outline-offset:3px; border-radius:2px}

  footer{position:relative; z-index:1; margin-top:clamp(2.6rem,7vw,4.2rem);
    font-size:0.74rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--taupe); opacity:.8}

  /* entrance — enhancement only; content is visible by default */
  @keyframes rise{from{opacity:0; transform:translateY(18px)} to{opacity:1; transform:none}}
  @keyframes bloom{from{opacity:0; transform:translateY(24px) scale(.985)} to{opacity:1; transform:none}}
  .mark{animation:rise 1s var(--ease) both}
  .cat{animation:bloom 1.15s var(--ease) .15s both}
  .lily{animation:bloom 1.15s var(--ease) .32s both}
  .message{animation:rise 1s var(--ease) .5s both}
  footer{animation:rise 1s var(--ease) .7s both}

  @media (max-width:640px){
    .works{flex-direction:column; gap:1.6rem}
    .cat .frame{width:min(82vw,380px)} .lily .frame{width:min(64vw,300px)} .lily{margin-top:0}
  }
  @media (prefers-reduced-motion:reduce){
    .mark,.cat,.lily,.message,footer{animation:none}
    .frame::after{opacity:.5}
  }
</style>
</head>
